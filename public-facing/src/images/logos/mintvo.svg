  <line x1="50" y1="58" x2="25" y2="50" stroke="#FFFFFF" stroke-width="2.8" stroke-linecap="round" opacity="0.38"/>
  <line x1="50" y1="73" x2="29" y2="66" stroke="#FFFFFF" stroke-width="2.8" stroke-linecap="round" opacity="0.28"/>
</svg>