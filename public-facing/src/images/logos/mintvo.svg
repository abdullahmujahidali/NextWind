  <line x1="50" y1="24" x2="50" y2="82" stroke="#FFFFFF" stroke-width="3.2" stroke-linecap="round" opacity="0.65"/>
  
  <!-- Right veins — staggered, angled upward-right -->
  <line x1="50" y1="38" x2="72" y2="30" stroke="#FFFFFF" stroke-width="2.8" stroke-linecap="round" opacity="0.5"/>
  <line x1="50" y1="52" x2="74" y2="44" stroke="#FFFFFF" stroke-width="2.8" stroke-linecap="round" opacity="0.38"/>
  <line x1="50" y1="66" x2="71" y2="59" stroke="#FFFFFF" stroke-width="2.8" stroke-linecap="round" opacity="0.28"/>
  
  <!-- Left veins — staggered DIFFERENTLY (offset from right) -->
